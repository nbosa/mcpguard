<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mcpguard live view</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      background: rgba(22, 27, 34, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 15px;
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #8b949e;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 6px #3fb95080;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .dot.disconnected {
      background: #f85149;
      box-shadow: 0 0 6px #f8514980;
    }
    .dot.connecting {
      background: #d29922;
      box-shadow: 0 0 6px #d2992280;
    }
    .count {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: #8b949e;
    }
    button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    button:hover { background: #30363d; }
    button:active { background: #3d444d; }
    .spacer { flex: 1; }
    label.toggle {
      font-size: 12px;
      color: #8b949e;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    label.toggle input { cursor: pointer; }
    .report-path {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: #6e7681;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    main {
      padding: 16px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .finding {
      background: #161b22;
      border: 1px solid #30363d;
      border-left-width: 4px;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .finding.severity-CRITICAL { border-left-color: #f85149; }
    .finding.severity-HIGH     { border-left-color: #db6d28; }
    .finding.severity-MEDIUM   { border-left-color: #d29922; }
    .finding.severity-LOW      { border-left-color: #58a6ff; }
    .finding.severity-INFO     { border-left-color: #8b949e; }
    .finding .header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .finding .time { color: #6e7681; font-size: 11px; }
    .finding .type {
      font-weight: 600;
      color: #c9d1d9;
      font-size: 13px;
    }
    .badge {
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.severity-CRITICAL { background: #f8514922; color: #f85149; }
    .badge.severity-HIGH     { background: #db6d2822; color: #db6d28; }
    .badge.severity-MEDIUM   { background: #d2992222; color: #d29922; }
    .badge.severity-LOW      { background: #58a6ff22; color: #58a6ff; }
    .badge.severity-INFO     { background: #8b949e22; color: #8b949e; }
    .badge.blocked { background: #f8514922; color: #f85149; }
    .badge.passed  { background: #3fb95022; color: #3fb950; }
    .finding .direction {
      font-size: 11px;
      color: #8b949e;
    }
    .finding .reason {
      margin: 6px 0;
      color: #c9d1d9;
      font-size: 13px;
    }
    .finding .meta {
      font-size: 11px;
      color: #8b949e;
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 4px 12px;
      margin-top: 6px;
    }
    .finding .meta .k { color: #6e7681; }
    .finding .evidence {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px 10px;
      margin-top: 8px;
      font-size: 12px;
      color: #c9d1d9;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .empty {
      text-align: center;
      color: #6e7681;
      padding: 60px 20px;
      font-size: 14px;
      line-height: 1.6;
    }
    .empty code {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
    }
    footer {
      text-align: center;
      color: #6e7681;
      font-size: 11px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>mcpguard live view</h1>
    <span class="status">
      <span class="dot connecting" id="dot"></span>
      <span id="status">connecting…</span>
    </span>
    <span class="count"><span id="count">0</span> findings</span>
    <button id="clearBtn" title="Clear current view (does not affect the source file)">clear</button>
    <label class="toggle"><input type="checkbox" id="autoscroll" checked> autoscroll</label>
    <label class="toggle"><input type="checkbox" id="pauseBtn"> pause</label>
    <span class="spacer"></span>
    <span class="report-path" id="report"></span>
  </header>
  <main>
    <div id="findings">
      <div class="empty">
        No findings yet.<br>
        The proxy will push events here as they happen.<br>
        Run the proxy with <code>--proxy-report &lt;path&gt;</code> and point this view at the same file.
      </div>
    </div>
  </main>
  <footer>mcpguard v0.2 · SSE live stream</footer>
  <script>
    const dot = document.getElementById('dot');
    const statusEl = document.getElementById('status');
    const countEl = document.getElementById('count');
    const findingsEl = document.getElementById('findings');
    const clearBtn = document.getElementById('clearBtn');
    const autoscrollEl = document.getElementById('autoscroll');
    const pauseBtn = document.getElementById('pauseBtn');
    const reportEl = document.getElementById('report');
    let count = 0;
    let paused = false;
    const pending = [];

    function setStatus(text, cls) {
      statusEl.textContent = text;
      dot.className = 'dot' + (cls ? ' ' + cls : '');
    }

    function fmtTime(ts) {
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts || '';
        return d.toISOString().substr(11, 12);
      } catch (e) {
        return ts || '';
      }
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderFinding(f) {
      const div = document.createElement('div');
      const severity = f.severity || 'INFO';
      div.className = `finding severity-${escapeHtml(severity)}`;
      const blockedBadge = f.blocked
        ? '<span class="badge blocked">BLOCKED</span>'
        : '<span class="badge passed">PASSED</span>';
      div.innerHTML = `
        <div class="header">
          <span class="time">${escapeHtml(fmtTime(f.timestamp))}</span>
          <span class="type">${escapeHtml(f.type || '')}</span>
          <span class="badge severity-${escapeHtml(severity)}">${escapeHtml(severity)}</span>
          ${blockedBadge}
          <span class="direction">${escapeHtml(f.direction || '')}</span>
        </div>
        <div class="reason">${escapeHtml(f.reason || '')}</div>
        <div class="meta">
          <span class="k">classifier</span><span>${escapeHtml(f.classifier || '')}</span>
          <span class="k">location</span><span>${escapeHtml(f.location || '')}</span>
          <span class="k">request_id</span><span>${escapeHtml(f.request_id || '')}</span>
        </div>
        ${f.evidence ? `<div class="evidence">${escapeHtml(f.evidence)}</div>` : ''}
      `;
      findingsEl.appendChild(div);
    }

    function flush() {
      const empty = findingsEl.querySelector('.empty');
      if (empty) findingsEl.innerHTML = '';
      while (pending.length) {
        renderFinding(pending.shift());
        count++;
      }
      countEl.textContent = count;
      if (autoscrollEl.checked) {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'auto' });
      }
    }

    clearBtn.addEventListener('click', () => {
      findingsEl.innerHTML = '<div class="empty">Cleared. New findings will appear here.</div>';
      count = 0;
      countEl.textContent = count;
    });

    pauseBtn.addEventListener('change', (e) => {
      paused = e.target.checked;
      if (!paused) flush();
    });

    const evtSource = new EventSource('/events');
    evtSource.addEventListener('hello', (e) => {
      try {
        const data = JSON.parse(e.data);
        reportEl.textContent = data.report || '';
        document.title = 'mcpguard live — ' + (data.report || '');
      } catch (err) {}
      setStatus('live');
    });
    evtSource.addEventListener('finding', (e) => {
      try {
        const f = JSON.parse(e.data);
        if (paused) {
          pending.push(f);
        } else {
          pending.push(f);
          flush();
        }
      } catch (err) {
        console.error('parse finding', err);
      }
    });
    evtSource.onopen = () => setStatus('live');
    evtSource.onerror = () => setStatus('disconnected', 'disconnected');
  </script>
</body>
</html>
